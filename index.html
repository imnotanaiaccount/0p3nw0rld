<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wild Explorers: Seamless Survival</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
        :root { --ui-green: #27ae60; --ui-green-s: #1e8449; --ui-blue: #2980b9; --ui-blue-s: #1a6496; --ui-gold: #f1c40f; --glass-bg: rgba(10, 20, 40, 0.85); --glass-border: rgba(255,255,255,0.15); --radius: 12px; --font: 'Nunito', sans-serif; }
        *, *::before, *::after { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: var(--font); touch-action: none; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }
        #main-menu, #game-over-screen, #loading-screen { position: absolute; inset: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        #main-menu { background: radial-gradient(ellipse at 50% -10%, #3a7bd5 0%, #001433 60%, #000a1a 100%); }
        #loading-screen { background: #000a1a; z-index: 300; display: none; }
        .menu-box { background: var(--glass-bg); padding: 28px; border-radius: 18px; display: flex; flex-direction: column; gap: 12px; width: 92%; max-width: 400px; border: 1px solid var(--glass-border); position: relative; z-index: 2; }
        button { padding: 14px; border-radius: var(--radius); border: none; font-size: 1rem; font-weight: 700; cursor: pointer; background: linear-gradient(145deg, #2ecc71, var(--ui-green)); color: white; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        #game-ui { position: absolute; inset: 0; color: white; pointer-events: none; z-index: 10; display: none; }
        #hud-panel { position: absolute; top: 20px; left: 20px; background: var(--glass-bg); border-radius: var(--radius); padding: 10px; pointer-events: auto; }
        #touch-zone-container { position: absolute; inset: 0; display: none; z-index: 5; pointer-events: auto; }
        #joystick-base { position: absolute; width: 120px; height: 120px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; transform: translate(-50%, -50%); pointer-events: none; }
        #joystick-nub { position: absolute; width: 50px; height: 50px; background: white; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .action-btn { position: absolute; width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; font-weight: 900; display: none; pointer-events: auto; }
        #btn-jump { bottom: 40px; right: 120px; }
        #btn-attack { bottom: 40px; right: 30px; width: 80px; height: 80px; }
        @media (hover: none) { .action-btn { display: block; } #touch-zone-container { display: block; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>

<div id="loading-screen"><h2>GENERATING WORLD...</h2></div>

<div id="main-menu">
    <h1>🌿 Wild Explorers</h1>
    <div class="menu-box">
        <select id="animal-select" style="padding:10px; border-radius:8px; margin-bottom:10px;">
            <option value="dog">🐕 Dog</option>
            <option value="cat">🐈 Cat</option>
            <option value="monkey">🐒 Monkey</option>
        </select>
        <button onclick="startGame()">▶ Start Survival</button>
    </div>
</div>

<div id="game-ui">
    <div id="hud-panel">
        <div id="health-bar-label">100 HP</div>
        <div style="width:150px; height:10px; background:#333;"><div id="health-bar" style="width:100%; height:100%; background:#2ecc71;"></div></div>
    </div>
</div>

<div id="touch-zone-container"></div>
<div id="joystick-base"><div id="joystick-nub"></div></div>
<button id="btn-jump" class="action-btn">JUMP</button>
<button id="btn-attack" class="action-btn">HIT</button>

<script>
let scene, camera, renderer, world, simplex, clock = new THREE.Clock();
let playerBody, playerGroup, playerStats, terrainChunks = {};
let gameActive = false, keys = {}, moveVector = new THREE.Vector2();
let camYaw = Math.PI, camPitch = 0.3, targetCamDistance = 12;
let lastMouseX = 0, lastMouseY = 0, joystickID = null, cameraTouchID = null;

const AnimalTraits = {
    dog: { speed: 14, jump: 12, color: 0x8B4513 },
    cat: { speed: 16, jump: 15, color: 0xFF8C00 },
    monkey: { speed: 10, jump: 18, color: 0x4A3728 }
};

function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'flex';
    
    setTimeout(() => {
        if (!scene) initGame();
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        gameActive = true;
        
        // CRITICAL FIX: Force focus on the canvas and window
        window.focus();
        renderer.domElement.focus();
        
        animate();
    }, 1000);
}

function initGame() {
    simplex = new SimplexNoise();
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.005);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    world = new CANNON.World();
    world.gravity.set(0, -20, 0);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(50, 100, 50);
    light.castShadow = true;
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const selected = document.getElementById('animal-select').value;
    playerStats = AnimalTraits[selected];
    
    // Player Physics
    playerBody = new CANNON.Body({ mass: 1, shape: new CANNON.Sphere(1), position: new CANNON.Vec3(0, 10, 0) });
    playerBody.fixedRotation = true;
    world.addBody(playerBody);

    // Player Visual
    playerGroup = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1.5), new THREE.MeshStandardMaterial({color: playerStats.color}));
    body.castShadow = true;
    playerGroup.add(body);
    scene.add(playerGroup);

    setupInputs();
    generateChunk(0, 0);
}

function generateChunk(cx, cz) {
    const size = 100, res = 20;
    const geo = new THREE.PlaneGeometry(size, size, res, res);
    geo.rotateX(-Math.PI / 2);
    const v = geo.attributes.position.array;
    for (let i = 0; i < v.length; i += 3) {
        v[i+1] = simplex.noise2D((cx * size + v[i]) * 0.02, (cz * size + v[i+2]) * 0.02) * 5;
    }
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x44aa44 }));
    mesh.position.set(cx * size, 0, cz * size);
    mesh.receiveShadow = true;
    scene.add(mesh);
}

function setupInputs() {
    // KEYBOARD - window level listener
    window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; if(e.key === ' ') playerJump(); }, true);
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; }, true);

    // MOUSE ROTATION - Request pointer lock on click
    renderer.domElement.addEventListener('mousedown', () => {
        if (gameActive) renderer.domElement.requestPointerLock();
    });

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === renderer.domElement || !isMobile) {
            camYaw -= e.movementX * 0.005;
            camPitch -= e.movementY * 0.005;
            camPitch = Math.max(-0.5, Math.min(1.2, camPitch));
        }
    });

    // MOBILE TOUCH
    const zone = document.getElementById('touch-zone-container');
    const joyBase = document.getElementById('joystick-base');
    const joyNub = document.getElementById('joystick-nub');

    zone.addEventListener('touchstart', (e) => {
        for (let t of e.changedTouches) {
            if (t.clientX < window.innerWidth / 2) {
                joystickID = t.identifier;
                joyBase.style.display = 'block';
                joyBase.style.left = t.clientX + 'px';
                joyBase.style.top = t.clientY + 'px';
            } else {
                cameraTouchID = t.identifier;
                lastMouseX = t.clientX; lastMouseY = t.clientY;
            }
        }
    }, {passive: false});

    zone.addEventListener('touchmove', (e) => {
        for (let t of e.changedTouches) {
            if (t.identifier === joystickID) {
                let dx = t.clientX - parseFloat(joyBase.style.left);
                let dy = t.clientY - parseFloat(joyBase.style.top);
                let dist = Math.min(50, Math.hypot(dx, dy));
                let angle = Math.atan2(dy, dx);
                moveVector.set(Math.cos(angle) * (dist/50), Math.sin(angle) * (dist/50));
                joyNub.style.transform = `translate(-50%,-50%) translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            } else if (t.identifier === cameraTouchID) {
                camYaw -= (t.clientX - lastMouseX) * 0.01;
                camPitch -= (t.clientY - lastMouseY) * 0.01;
                lastMouseX = t.clientX; lastMouseY = t.clientY;
            }
        }
    }, {passive: false});

    zone.addEventListener('touchend', (e) => {
        for (let t of e.changedTouches) {
            if (t.identifier === joystickID) { joystickID = null; joyBase.style.display = 'none'; moveVector.set(0,0); }
            if (t.identifier === cameraTouchID) cameraTouchID = null;
        }
    });
}

function playerJump() {
    if (Math.abs(playerBody.velocity.y) < 0.1) playerBody.velocity.y = playerStats.jump;
}

function animate() {
    if (!gameActive) return;
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.1);
    world.step(1/60, dt);

    // Movement Logic
    let x = 0, z = 0;
    if (keys['w']) z -= 1; if (keys['s']) z += 1;
    if (keys['a']) x -= 1; if (keys['d']) x += 1;
    
    // Joystick override
    if (moveVector.length() > 0.1) { x = moveVector.x; z = moveVector.y; }

    const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0,1,0), camYaw);
    const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), camYaw);
    const move = forward.multiplyScalar(-z).add(right.multiplyScalar(x)).normalize();
    
    playerBody.velocity.x = move.x * playerStats.speed;
    playerBody.velocity.z = move.z * playerStats.speed;

    // Sync Visuals
    playerGroup.position.copy(playerBody.position);
    if (move.length() > 0.1) {
        playerGroup.rotation.y = Math.atan2(move.x, move.z);
    }

    // Camera Logic
    const targetPos = new THREE.Vector3(
        playerBody.position.x + Math.sin(camYaw) * Math.cos(camPitch) * targetCamDistance,
        playerBody.position.y + Math.sin(camPitch) * targetCamDistance + 2,
        playerBody.position.z + Math.cos(camYaw) * Math.cos(camPitch) * targetCamDistance
    );
    camera.position.lerp(targetPos, 0.2);
    camera.lookAt(playerBody.position.x, playerBody.position.y + 1, playerBody.position.z);

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
